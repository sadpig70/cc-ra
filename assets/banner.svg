<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" width="1400" height="360" role="img" aria-label="cc-ra — Claude Code Rust Analyzer">
  <title>cc-ra — Claude Code Rust Analyzer</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0.35">
      <!-- Rainbow cycle: 3 stops move through the color wheel with 1-step offsets,
           producing a smooth flowing rainbow on any element using url(#accent). -->
      <stop offset="0%">
        <animate attributeName="stop-color"
                 values="#F56565; #F6AD55; #F6E05E; #68D391; #4FD1C5; #63B3ED; #9F7AEA; #F687B3; #F56565"
                 dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%">
        <animate attributeName="stop-color"
                 values="#F6AD55; #F6E05E; #68D391; #4FD1C5; #63B3ED; #9F7AEA; #F687B3; #F56565; #F6AD55"
                 dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color"
                 values="#F6E05E; #68D391; #4FD1C5; #63B3ED; #9F7AEA; #F687B3; #F56565; #F6AD55; #F6E05E"
                 dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#B794F6" stop-opacity="0.80"/>
      <stop offset="55%"  stop-color="#B794F6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B794F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="typewriter1">
      <rect x="80" y="220" width="0" height="44">
        <animate attributeName="width"
                 values="0; 540; 540; 0;   0"
                 keyTimes="0; 0.20; 0.65; 0.80; 1"
                 dur="9s" begin="1.0s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="typewriter2">
      <rect x="80" y="260" width="0" height="32">
        <animate attributeName="width"
                 values="0; 0;    620;  620; 0;   0"
                 keyTimes="0; 0.22; 0.42; 0.65; 0.80; 1"
                 dur="9s" begin="1.0s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1400" height="360" fill="url(#bg)"/>

  <!-- subtle scanlines -->
  <g stroke="#21262d" stroke-width="1" opacity="0.25">
    <line x1="0" y1="90"  x2="1400" y2="90"/>
    <line x1="0" y1="180" x2="1400" y2="180"/>
    <line x1="0" y1="270" x2="1400" y2="270"/>
  </g>

  <!-- Particle field — 28 drifting points -->
  <g fill="#B794F6" filter="url(#softGlow)">
    <circle cx="120"  cy="58"  r="1.6"><animate attributeName="cy" values="58;40;58"    dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.25;0.9;0.25" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="230"  cy="95"  r="1.2"><animate attributeName="cy" values="95;115;95"   dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.35;0.8;0.35" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="340"  cy="40"  r="1.8"><animate attributeName="cy" values="40;70;40"    dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.15;0.7;0.15" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="450"  cy="70"  r="1.1"><animate attributeName="cx" values="450;470;450" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.9;0.3"  dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="560"  cy="30"  r="1.4"><animate attributeName="cy" values="30;55;30"    dur="10s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.8;0.2" dur="10s" repeatCount="indefinite"/></circle>
    <circle cx="680"  cy="85"  r="1.7"><animate attributeName="cy" values="85;60;85"    dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.75;0.3" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="80"   cy="300" r="1.3"><animate attributeName="cy" values="300;285;300" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.9;0.2"  dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="200"  cy="330" r="1.5"><animate attributeName="cy" values="330;315;330" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.15;0.8;0.15" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="420"  cy="310" r="1.2"><animate attributeName="cx" values="420;405;420" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.25;0.85;0.25" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="620"  cy="325" r="1.6"><animate attributeName="cy" values="325;310;325" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.7;0.2"  dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="820"  cy="305" r="1.1"><animate attributeName="cy" values="305;290;305" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.9;0.3"  dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="760"  cy="55"  r="1.3"><animate attributeName="cy" values="55;75;55"    dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.85;0.2" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="890"  cy="35"  r="1.5"><animate attributeName="cy" values="35;60;35"    dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.15;0.8;0.15" dur="6s" repeatCount="indefinite"/></circle>

    <!-- orange/pink tint particles -->
    <circle cx="170"  cy="155" r="1.4" fill="#F6AD55"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="5s" repeatCount="indefinite"/><animate attributeName="cy" values="155;170;155" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="390"  cy="210" r="1.2" fill="#F687B3"><animate attributeName="opacity" values="0.25;0.9;0.25" dur="7s" repeatCount="indefinite"/><animate attributeName="cx" values="390;405;390" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="640"  cy="170" r="1.5" fill="#F6AD55"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="9s" repeatCount="indefinite"/><animate attributeName="cy" values="170;150;170" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="740"  cy="225" r="1.1" fill="#F687B3"><animate attributeName="opacity" values="0.3;0.9;0.3"  dur="6s" repeatCount="indefinite"/><animate attributeName="cx" values="740;755;740" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="900"  cy="155" r="1.3" fill="#F6AD55"><animate attributeName="opacity" values="0.2;0.8;0.2"  dur="7s" repeatCount="indefinite"/><animate attributeName="cy" values="155;135;155" dur="7s" repeatCount="indefinite"/></circle>

    <!-- right side particles around the orbit ring -->
    <circle cx="1050" cy="60"  r="1.6"><animate attributeName="cy" values="60;75;60"    dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.25;0.9;0.25" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="1320" cy="95"  r="1.2"><animate attributeName="cy" values="95;115;95"   dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.85;0.3"  dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="1135" cy="320" r="1.4"><animate attributeName="cy" values="320;300;320" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.9;0.2"  dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="1280" cy="295" r="1.1"><animate attributeName="cx" values="1280;1295;1280" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.85;0.3" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="295" r="1.3"><animate attributeName="cy" values="295;310;295" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.25;0.8;0.25" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="1360" cy="200" r="1.5"><animate attributeName="cy" values="200;220;200" dur="10s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.75;0.2" dur="10s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="180" r="1.2"><animate attributeName="cx" values="1020;1005;1020" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.9;0.3" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="1250" cy="55"  r="1.4"><animate attributeName="cy" values="55;70;55"    dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.85;0.2" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="1385" cy="150" r="1.1"><animate attributeName="cy" values="150;170;150" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.25;0.9;0.25" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="1160" cy="45"  r="1.3"><animate attributeName="cy" values="45;60;45"    dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.8;0.2"  dur="8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Title "cc-ra" — per-char reveal + continuous hover-bounce -->
  <g font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', Consolas, monospace" font-weight="800" font-size="118" fill="url(#accent)" filter="url(#softGlow)">
    <text x="80" y="190" opacity="0">c
      <animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 40" to="0 0" begin="0.15s" dur="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" begin="3.5s" dur="2.8s" repeatCount="indefinite" additive="sum"/>
    </text>
    <text x="150" y="190" opacity="0">c
      <animate attributeName="opacity" from="0" to="1" begin="0.30s" dur="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 40" to="0 0" begin="0.30s" dur="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" begin="3.7s" dur="2.8s" repeatCount="indefinite" additive="sum"/>
    </text>
    <text x="220" y="190" opacity="0">-
      <animate attributeName="opacity" from="0" to="1" begin="0.45s" dur="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 40" to="0 0" begin="0.45s" dur="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" begin="3.9s" dur="2.8s" repeatCount="indefinite" additive="sum"/>
    </text>
    <text x="280" y="190" opacity="0">r
      <animate attributeName="opacity" from="0" to="1" begin="0.60s" dur="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 40" to="0 0" begin="0.60s" dur="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" begin="4.1s" dur="2.8s" repeatCount="indefinite" additive="sum"/>
    </text>
    <text x="345" y="190" opacity="0">a
      <animate attributeName="opacity" from="0" to="1" begin="0.75s" dur="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 40" to="0 0" begin="0.75s" dur="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" begin="4.3s" dur="2.8s" repeatCount="indefinite" additive="sum"/>
    </text>
  </g>

  <!-- Subtitle: typewriter -->
  <g clip-path="url(#typewriter1)">
    <text x="80" y="254" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="600" fill="#c9d1d9">Claude Code Rust Analyzer</text>
  </g>
  <!-- typewriter cursor for subtitle — tracks the clip width in sync -->
  <rect x="80" y="230" width="3" height="30" fill="#B794F6">
    <animate attributeName="x"
             values="80; 620; 620; 80;  80"
             keyTimes="0; 0.20; 0.65; 0.80; 1"
             dur="9s" begin="1.0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline: typewriter -->
  <g clip-path="url(#typewriter2)">
    <text x="80" y="290" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="17" fill="#8b949e">8 thinking positions · symbolic code trace · PG-structured findings</text>
  </g>

  <!-- Signature — fades in after tagline completes, fades out before the erase phase -->
  <text x="80" y="322" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="14" font-style="italic" fill="#6e7681" opacity="0">find what clippy can't.
    <animate attributeName="opacity"
             values="0; 0;    1;    1;    0;    0"
             keyTimes="0; 0.47; 0.55; 0.70; 0.78; 1"
             dur="9s" begin="1.0s" repeatCount="indefinite"/>
  </text>

  <!-- Right: rotating orbital ring of 8 thinking positions around central code core -->
  <g transform="translate(1180, 180)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.8s" fill="freeze"/>

    <!-- outer faint guide ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="2 4" opacity="0.45"/>

    <!-- rotating group with 8 nodes + connector spokes -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="36s" repeatCount="indefinite"/>

      <!-- connector spokes -->
      <g stroke="#30363d" stroke-width="1.5" opacity="0.7">
        <line x1="0"     y1="-110"   x2="0"      y2="-38"/>
        <line x1="77.8"  y1="-77.8"  x2="26.9"   y2="-26.9"/>
        <line x1="110"   y1="0"      x2="38"     y2="0"/>
        <line x1="77.8"  y1="77.8"   x2="26.9"   y2="26.9"/>
        <line x1="0"     y1="110"    x2="0"      y2="38"/>
        <line x1="-77.8" y1="77.8"   x2="-26.9"  y2="26.9"/>
        <line x1="-110"  y1="0"      x2="-38"    y2="0"/>
        <line x1="-77.8" y1="-77.8"  x2="-26.9"  y2="-26.9"/>
      </g>

      <!-- 8 position nodes (counter-rotate so labels stay upright) -->
      <g font-family="ui-monospace, monospace" font-size="12" font-weight="800" fill="#0d1117">
        <g transform="translate(0,-110)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="36s" repeatCount="indefinite" additive="sum"/>
          <circle r="20" fill="#B794F6" filter="url(#softGlow)">
            <animate attributeName="r" values="20;22;20" dur="2.4s" repeatCount="indefinite"/>
          </circle>
          <text y="4" text-anchor="middle">Sk</text>
        </g>
        <g transform="translate(77.8,-77.8)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="36s" repeatCount="indefinite" additive="sum"/>
          <circle r="20" fill="#D6BCFA" filter="url(#softGlow)">
            <animate attributeName="r" values="20;22;20" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
          </circle>
          <text y="4" text-anchor="middle">Pa</text>
        </g>
        <g transform="translate(110,0)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="36s" repeatCount="indefinite" additive="sum"/>
          <circle r="20" fill="#F6AD55" filter="url(#softGlow)">
            <animate attributeName="r" values="20;22;20" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
          </circle>
          <text y="4" text-anchor="middle">Hi</text>
        </g>
        <g transform="translate(77.8,77.8)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="36s" repeatCount="indefinite" additive="sum"/>
          <circle r="20" fill="#FBD38D" filter="url(#softGlow)">
            <animate attributeName="r" values="20;22;20" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
          </circle>
          <text y="4" text-anchor="middle">Nw</text>
        </g>
        <g transform="translate(0,110)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="36s" repeatCount="indefinite" additive="sum"/>
          <circle r="20" fill="#FC8181" filter="url(#softGlow)">
            <animate attributeName="r" values="20;22;20" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
          </circle>
          <text y="4" text-anchor="middle">Ad</text>
        </g>
        <g transform="translate(-77.8,77.8)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="36s" repeatCount="indefinite" additive="sum"/>
          <circle r="20" fill="#68D391" filter="url(#softGlow)">
            <animate attributeName="r" values="20;22;20" dur="2.4s" begin="1.5s" repeatCount="indefinite"/>
          </circle>
          <text y="4" text-anchor="middle">Ho</text>
        </g>
        <g transform="translate(-110,0)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="36s" repeatCount="indefinite" additive="sum"/>
          <circle r="20" fill="#63B3ED" filter="url(#softGlow)">
            <animate attributeName="r" values="20;22;20" dur="2.4s" begin="1.8s" repeatCount="indefinite"/>
          </circle>
          <text y="4" text-anchor="middle">Re</text>
        </g>
        <g transform="translate(-77.8,-77.8)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="36s" repeatCount="indefinite" additive="sum"/>
          <circle r="20" fill="#9F7AEA" filter="url(#softGlow)">
            <animate attributeName="r" values="20;22;20" dur="2.4s" begin="2.1s" repeatCount="indefinite"/>
          </circle>
          <text y="4" text-anchor="middle">Au</text>
        </g>
      </g>
    </g>

    <!-- Core glow -->
    <circle cx="0" cy="0" r="60" fill="url(#core)">
      <animate attributeName="r" values="55;70;55" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Core box (code under analysis) -->
    <g filter="url(#softGlow)">
      <rect x="-34" y="-34" width="68" height="68" rx="10" fill="#0d1117" stroke="#B794F6" stroke-width="2"/>
      <text x="0" y="11" text-anchor="middle" font-family="ui-monospace, monospace" font-size="32" font-weight="800" fill="#B794F6">{ }</text>
    </g>
  </g>
</svg>
